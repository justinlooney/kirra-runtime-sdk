apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis.fullname" . }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aegis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aegis.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aegis.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: verifier
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: AEGIS_VERIFIER_ADDR
              value: "0.0.0.0:8090"
            - name: AEGIS_DB_PATH
              value: "/var/lib/aegis/aegis.db"
            - name: AEGIS_VERIFIER_MODE
              value: {{ .Values.aegis.verifierMode | quote }}
            - name: AEGIS_TRUSTED_INGRESS_MODE
              value: {{ .Values.aegis.trustedIngressMode | quote }}
            - name: AEGIS_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegis.secretName" . }}
                  key: admin-token
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/aegis

        {{- if .Values.dashboard.enabled }}
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: dashboard
              containerPort: 80
              protocol: TCP
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
        {{- end }}

      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "aegis.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
