{{- if not .Values.aegis.existingSecret -}}
{{- if .Values.aegis.adminToken -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegis.fullname" . }}
  labels:
    {{- include "aegis.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-token: {{ .Values.aegis.adminToken | quote }}
{{- else }}
{{- fail "aegis.adminToken is required unless aegis.existingSecret is set" }}
{{- end }}
{{- end }}
