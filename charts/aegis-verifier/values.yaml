image:
  repository: aegis-verifier
  tag: latest
  pullPolicy: IfNotPresent

verifier:
  mode: active
  dbPath: /data/aegis_verifier.sqlite
  port: 8088
  logLevel: info

admin:
  existingSecret: ""
  token: "change-me-in-production-secure-profile"

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 8088

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
